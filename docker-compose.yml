version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mf_intel_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mf_intel_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "mf_intel"
      CORS_ORIGINS: "http://localhost:3000"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@mfintel.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin@12345}"
      SENDER_EMAIL: "${SENDER_EMAIL:-onboarding@resend.dev}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-}"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: mf_intel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: "http://localhost:8001"
      WDS_SOCKET_PORT: "0"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
